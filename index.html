<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerulea • Mapa Interativo</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/styles.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #mapa {
      height: 100vh;
      width: 100vw;
      background: #7a9ea0;
    }
  </style>
</head>

<body>
  <div id="mapa"></div>

  <!-- Bibliotecas externas -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

  <!-- Módulos do projeto (ordem importa: baixo nível → alto nível) -->
  <script src="js/markers.js"></script>
  <script src="js/dados.js"></script>
  <script src="js/popup.js"></script>
  <script src="js/regua.js"></script>
  <script src="js/filtros.js"></script>
  <script src="js/busca.js"></script>
  <script src="js/deeplink.js"></script>

  <script>
    // =============================================================
    // CONFIGURAÇÃO DO MAPA
    // =============================================================

    const LARGURA = 3000;
    const ALTURA = 4000;
    const LIMITES = [[0, 0], [ALTURA, LARGURA]];
    const WIKI_BASE = 'https://gabinska.github.io/Cerulea/';

    const mapa = L.map('mapa', {
      crs: L.CRS.Simple,
      minZoom: -5,
      maxZoom: 2,
      zoomSnap: 0,
      zoomDelta: 0.5,
      maxBounds: LIMITES,
      maxBoundsViscosity: 1.0,
    });

    L.imageOverlay('assets/mapa-cerulea.png', LIMITES).addTo(mapa);
    mapa.fitBounds(LIMITES);
    mapa.setMinZoom(mapa.getZoom());


    // =============================================================
    // COMPORTAMENTO DO MAPA
    // =============================================================

    // Recalcula o zoom mínimo quando a janela redimensiona, preservando
    // a view atual se o usuário já estava com zoom maior que o novo piso.
    function recalcularMinZoom() {
      const zoomAtual = mapa.getZoom();
      const centroAtual = mapa.getCenter();

      mapa.setMinZoom(-5);
      const zoomIdeal = mapa.getBoundsZoom(LIMITES);
      mapa.setMinZoom(zoomIdeal);

      if (zoomAtual < zoomIdeal) {
        mapa.setView(centroAtual, zoomIdeal);
      }
    }

    mapa.on('resize', recalcularMinZoom);


    // =============================================================
    // INICIALIZAÇÃO DOS MÓDULOS
    // =============================================================

    Popup.inicializar(mapa, { wikiBase: WIKI_BASE });
    Regua.inicializar(mapa);
    Filtros.inicializar(mapa);
    Busca.inicializar(mapa);
    DeepLink.inicializar(mapa);

    Dados.carregarYAML('data/velocidades.yaml')
      .then(velocidades => Regua.configurarVelocidades(velocidades))
      .catch(erro => console.warn('Velocidades não carregadas, tempo ficará desabilitado:', erro));


    // =============================================================
    // ORQUESTRAÇÃO
    // =============================================================

    // Lê o índice de categorias, carrega cada arquivo de dados em paralelo,
    // cria markers em seus grupos, e delega o registro aos módulos.
    async function carregarTudo() {
      try {
        const categorias = await Dados.carregarYAML('data/categorias.yaml');
        const resultados = await Promise.all(
          categorias.map(cat => Dados.carregarCategoria(cat))
        );

        // Indexa categorias por id pra pegar o nome no registro dos filtros
        const categoriaPorId = Object.fromEntries(categorias.map(c => [c.id, c]));

        for (const { id, markers } of resultados) {
          const grupo = L.layerGroup();

          for (const dados of markers) {
            const icone = getIcone(dados);
            if (!icone) {
              console.warn(`Sem ícone registrado para marker "${dados.nome}" (categoria "${dados.categoria}")`);
              continue;
            }

            const marker = L.marker(dados.coordenadas, { icon: icone }).addTo(grupo);

            Popup.ligarMarker(marker, dados);
            Busca.registrar(marker, dados);
            DeepLink.registrar(marker, dados);
          }

          grupo.addTo(mapa);
          Filtros.registrar(categoriaPorId[id], grupo);
        }

        Filtros.construir();
        Busca.construir();
        DeepLink.abrirSeHouver();
      } catch (erro) {
        console.error('Falha ao carregar markers:', erro);
      }
    }

    carregarTudo();
  </script>
</body>
</html>
