<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cerulea • Mapa Interativo</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #mapa {
      height: 100vh;
      width: 100vw;
      background: #7a9ea0;
    }
  </style>
</head>

<body>
  <div id="mapa"></div>

  <!-- Bibliotecas externas -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

  <!-- Ícones dos markers (SVGs + getIcone) -->
  <script src="js/markers.js"></script>

  <script>
    // =============================================================
    // CONFIGURAÇÃO DO MAPA
    // =============================================================

    const largura = 3000;
    const altura = 4000;
    const limites = [[0, 0], [altura, largura]];

    const WIKI_BASE = 'https://gabinska.github.io/Cerulea/';

    const mapa = L.map('mapa', {
      crs: L.CRS.Simple,
      minZoom: -5,
      maxZoom: 2,
      zoomSnap: 0,
      zoomDelta: 0.5,
      maxBounds: limites,
      maxBoundsViscosity: 1.0
    });

    L.imageOverlay('assets/mapa-cerulea.png', limites).addTo(mapa);

    // Enquadramento inicial: mapa cabe na tela, e esse zoom vira o piso.
    mapa.fitBounds(limites);
    mapa.setMinZoom(mapa.getZoom());

    // Guarda os layerGroups por categoria — preenchido em carregarTudo(),
    // lido depois em construirFiltros().
    const grupos = {};


    // =============================================================
    // COMPORTAMENTO DO MAPA
    // =============================================================

    // Recalcula o zoom mínimo quando a janela redimensiona, preservando a
    // view atual se o usuário já estava com zoom maior que o novo piso.
    function recalcularMinZoom() {
      const zoomAtual = mapa.getZoom();
      const centroAtual = mapa.getCenter();

      mapa.setMinZoom(-5);
      const zoomIdeal = mapa.getBoundsZoom(limites);
      mapa.setMinZoom(zoomIdeal);

      if (zoomAtual < zoomIdeal) {
        mapa.setView(centroAtual, zoomIdeal);
      }
    }

    mapa.on('resize', recalcularMinZoom);


    // =============================================================
    // CARREGAMENTO DE DADOS (YAML)
    // =============================================================

    // Baixa um YAML e devolve o objeto JS parseado.
    async function carregarYAML(caminho) {
      const resposta = await fetch(caminho);
      if (!resposta.ok) {
        throw new Error(`HTTP ${resposta.status} ao buscar ${caminho}`);
      }
      const texto = await resposta.text();
      return jsyaml.load(texto);
    }

    // Carrega os markers de uma categoria e devolve { id, markers }.
    async function carregarCategoria(categoria) {
      const markers = await carregarYAML(`data/${categoria.arquivo}`);
      return { id: categoria.id, markers };
    }


    // =============================================================
    // RENDERIZAÇÃO DE MARKERS
    // =============================================================

    // Monta o HTML do popup que abre ao clicar num marker.
    function montarPopup(m) {
      return `
        <h3>${m.nome}</h3>
        ${m.capital ? `<p class="popup-capital">Capital</p>` : ''}
        ${m.provincia ? `<p><strong>Província:</strong> ${m.provincia}</p>` : ''}
        ${m.governo ? `<p><strong>Governo:</strong> ${m.governo}</p>` : ''}
        ${m.batalhao ? `<p><strong>Batalhão:</strong> ${m.batalhao}</p>` : ''}
        ${m.comandante ? `<p><strong>Comandante:</strong> ${m.comandante}</p>` : ''}
        ${m.populacao ? `<p><strong>População:</strong> ${m.populacao.toLocaleString('pt-BR')}</p>` : ''}
        ${m.wiki ? `<p><a href="${WIKI_BASE}${m.wiki}" target="_blank">Ler na wiki</a></p>` : ''}
      `;
    }

    // Calcula o offset vertical/horizontal de um popup dado seu tamanho
    // real (ou estimado). Separa o cálculo em uma função pura pra poder
    // chamar duas vezes: antes de abrir (com estimativa) e depois de
    // abrir (com medidas reais).
    function calcularOffsetComTamanho(marker, larguraPopup, alturaPopup) {
      const margem = 20;
      const pontoNaTela = mapa.latLngToContainerPoint(marker.getLatLng());
      const tamanhoMapa = mapa.getSize();

      const espacoAcima = pontoNaTela.y - margem;
      const espacoAbaixo = tamanhoMapa.y - pontoNaTela.y - margem;
      const espacoEsquerda = pontoNaTela.x - margem;
      const espacoDireita = tamanhoMapa.x - pontoNaTela.x - margem;

      let offsetY = 0;
      if (espacoAcima < alturaPopup && espacoAbaixo > espacoAcima) {
        offsetY = alturaPopup + 20;
      }

      let offsetX = 0;
      const metadePopup = larguraPopup / 2;
      if (espacoEsquerda < metadePopup) {
        offsetX = metadePopup - espacoEsquerda;
      } else if (espacoDireita < metadePopup) {
        offsetX = -(metadePopup - espacoDireita);
      }

      return L.point(offsetX, offsetY);
    }


    // =============================================================
    // PAINEL DE FILTROS
    // =============================================================

    // SVG do funil — inline pra ficar auto-contido, sem dependência externa.
    const svgFunil = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M3 4h18v2l-7 8v6l-4 2v-8L3 6V4z"/>
    </svg>`;

    // Devolve o SVG apropriado pra miniatura de uma categoria no painel.
    // Pra cidade-estado, mostra o ícone não-capital (representa a categoria,
    // não uma cidade específica).
    function getIconeMiniatura(categoriaId) {
      const fake = { categoria: categoriaId };
      const icone = window.getIcone(fake);
      return icone ? icone.options.html : '';
    }

    // Monta o painel colapsável de filtros no canto superior-esquerdo.
    function construirFiltros(categorias) {
      const painel = L.control({ position: 'topleft' });

      painel.onAdd = function() {
        const div = L.DomUtil.create('div', 'painel-filtros');

        // --- Botão do funil (estado fechado) ---
        const toggle = document.createElement('button');
        toggle.className = 'painel-filtros-toggle';
        toggle.title = 'Filtros';
        toggle.setAttribute('aria-label', 'Abrir filtros');
        toggle.innerHTML = svgFunil;
        toggle.addEventListener('click', () => {
          div.classList.add('aberto');
        });
        div.appendChild(toggle);

        // --- Conteúdo expandido ---
        const conteudo = document.createElement('div');
        conteudo.className = 'painel-filtros-conteudo';

        // Cabeçalho (título + botão de fechar)
        const header = document.createElement('div');
        header.className = 'painel-filtros-header';
        header.innerHTML = '<h4>Filtros</h4>';

        const fechar = document.createElement('button');
        fechar.className = 'painel-filtros-fechar';
        fechar.textContent = '×';
        fechar.title = 'Fechar';
        fechar.setAttribute('aria-label', 'Fechar filtros');
        fechar.addEventListener('click', () => {
          div.classList.remove('aberto');
        });
        header.appendChild(fechar);
        conteudo.appendChild(header);

        // Uma linha por categoria
        for (const cat of categorias) {
          const grupo = grupos[cat.id];
          if (!grupo) continue;

          const label = document.createElement('label');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = true;
          checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
              grupo.addTo(mapa);
            } else {
              mapa.removeLayer(grupo);
            }
          });

          const iconeWrapper = document.createElement('span');
          iconeWrapper.className = 'icone-categoria';
          iconeWrapper.innerHTML = getIconeMiniatura(cat.id);

          const nome = document.createElement('span');
          nome.textContent = cat.nome;

          const contagem = document.createElement('span');
          contagem.className = 'contagem';
          contagem.textContent = `(${grupo.getLayers().length})`;

          label.append(checkbox, iconeWrapper, nome, contagem);
          conteudo.appendChild(label);
        }

        div.appendChild(conteudo);

        // Impede que cliques/scrolls no painel afetem o mapa
        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);

        return div;
      };

      painel.addTo(mapa);
    }


    // =============================================================
    // DEEP-LINK POR URL (?marker=nome)
    // =============================================================

    // Normaliza um nome pra comparação: minúsculo, sem acento, hífen
    // no lugar de espaços e apóstrofes. "Forte Elpída" → "forte-elpida".
    // "Nascente de Y'shar" → "nascente-de-y-shar".
    function normalizar(texto) {
      return texto
        .toLowerCase()
        .normalize('NFD')                 // separa letra e acento
        .replace(/[\u0300-\u036f]/g, '')  // remove os acentos separados
        .replace(/['']/g, '-')             // apóstrofes viram hífen
        .replace(/\s+/g, '-');             // espaços viram hífen
    }

    // Coleta todos os markers criados, indexados pelo nome normalizado.
    // Preenchido em carregarTudo(), lido em abrirMarkerDaURL().
    const markersPorNome = {};

    // Lê ?marker=xxx da URL atual. Devolve o nome normalizado ou null.
    function lerMarkerDaURL() {
      const params = new URLSearchParams(window.location.search);
      const nome = params.get('marker');
      return nome ? normalizar(nome) : null;
    }

    // Se a URL tem ?marker=xxx válido, centraliza o mapa nele e dispara
    // o clique no marker (que cuida de calcular offset e abrir o popup).
    function abrirMarkerDaURL() {
      const alvo = lerMarkerDaURL();
      if (!alvo) return;

      const marker = markersPorNome[alvo];
      if (!marker) {
        console.warn(`Marker "${alvo}" não encontrado.`);
        return;
      }

      mapa.setView(marker.getLatLng(), -1);
      marker.fire('click');
    }

    // =============================================================
    // BUSCA
    // =============================================================

    // SVG da lupa — ícone do botão de busca colapsado.
    const svgLupa = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <path d="M21 21l-4.35-4.35"/>
    </svg>`;

    // Índice de busca: lista achatada com todos os markers e seus
    // nomes normalizados. Preenchido em carregarTudo().
    const indiceBusca = [];

    // Rótulos legíveis por categoria (pra mostrar na lista de resultados).
    const rotulosCategoria = {
      'cidade-estado': 'Cidade',
      'hidrografia': 'Hidrografia',
      'terreno': 'Terreno',
      'rota': 'Rota',
      'povoado': 'Povoado',
    };

    // Limite de resultados mostrados na lista.
    const LIMITE_RESULTADOS = 5;

    // Procura markers cujo nome (normalizado) contém o termo digitado.
    function buscarMarkers(termo) {
      const alvo = normalizar(termo.trim());
      if (!alvo) return [];
      return indiceBusca.filter(item => item.nomeNormalizado.includes(alvo));
    }

    // Monta o painel de busca colapsável no canto superior-direito.
    function construirBusca() {
      const painel = L.control({ position: 'topright' });

      painel.onAdd = function() {
        const div = L.DomUtil.create('div', 'painel-busca');

        // --- Botão da lupa (estado fechado) ---
        const toggle = document.createElement('button');
        toggle.className = 'painel-busca-toggle';
        toggle.title = 'Buscar';
        toggle.setAttribute('aria-label', 'Abrir busca');
        toggle.innerHTML = svgLupa;
        div.appendChild(toggle);

        // --- Conteúdo expandido ---
        const conteudo = document.createElement('div');
        conteudo.className = 'painel-busca-conteudo';

        // Linha do input
        const linha = document.createElement('div');
        linha.className = 'painel-busca-linha';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'painel-busca-input';
        input.placeholder = 'Buscar lugar...';

        const fechar = document.createElement('button');
        fechar.className = 'painel-busca-fechar';
        fechar.textContent = '×';
        fechar.title = 'Fechar';
        fechar.setAttribute('aria-label', 'Fechar busca');

        linha.append(input, fechar);
        conteudo.appendChild(linha);

        // Lista de resultados
        const resultados = document.createElement('div');
        resultados.className = 'painel-busca-resultados';
        conteudo.appendChild(resultados);

        div.appendChild(conteudo);

        // --- Comportamento ---

        // Abrir pelo ícone da lupa: expande e foca o input
        toggle.addEventListener('click', () => {
          div.classList.add('aberto');
          input.focus();
        });

        // Fechar: esvazia campo e lista, colapsa o painel
        function fecharPainel() {
          input.value = '';
          resultados.innerHTML = '';
          div.classList.remove('aberto');
        }
        fechar.addEventListener('click', fecharPainel);

        // Guarda o índice do item destacado via teclado (-1 = nenhum)
        let indiceDestacado = -1;

        // Renderiza a lista de resultados a partir do texto atual
        function renderizarResultados() {
          const termo = input.value;
          resultados.innerHTML = '';
          indiceDestacado = -1;

          if (!termo.trim()) return;

          const achados = buscarMarkers(termo);
          const mostrados = achados.slice(0, LIMITE_RESULTADOS);

          mostrados.forEach((item, i) => {
            const linha = document.createElement('div');
            linha.className = 'resultado-item';
            linha.dataset.indice = i;

            const icone = document.createElement('span');
            icone.className = 'icone-categoria';
            icone.innerHTML = getIconeMiniatura(item.categoria);

            const nome = document.createElement('span');
            nome.className = 'nome';
            nome.textContent = item.nome;

            const categoriaLabel = document.createElement('span');
            categoriaLabel.className = 'categoria-label';
            categoriaLabel.textContent = rotulosCategoria[item.categoria] || item.categoria;

            linha.append(icone, nome, categoriaLabel);
            linha.addEventListener('click', () => selecionar(item));
            resultados.appendChild(linha);
          });

          // Rodapé "e mais N resultados"
          const restantes = achados.length - mostrados.length;
          if (restantes > 0) {
            const rodape = document.createElement('div');
            rodape.className = 'resultado-mais';
            rodape.textContent = `e mais ${restantes} resultado${restantes > 1 ? 's' : ''}`;
            resultados.appendChild(rodape);
          }
        }

        // Ação quando um resultado é escolhido (clique ou Enter)
        function selecionar(item) {
          fecharPainel();
          mapa.setView(item.marker.getLatLng(), -1);
          item.marker.fire('click');
        }

        // Atualiza visualmente qual item está destacado pelo teclado
        function atualizarDestaque() {
          const itens = resultados.querySelectorAll('.resultado-item');
          itens.forEach((el, i) => {
            el.classList.toggle('destacado', i === indiceDestacado);
          });
        }

        // Input digitado → atualiza a lista
        input.addEventListener('input', renderizarResultados);

        // Navegação por teclado
        input.addEventListener('keydown', (e) => {
          const itens = resultados.querySelectorAll('.resultado-item');

          if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (itens.length === 0) return;
            indiceDestacado = Math.min(indiceDestacado + 1, itens.length - 1);
            atualizarDestaque();
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (itens.length === 0) return;
            indiceDestacado = Math.max(indiceDestacado - 1, 0);
            atualizarDestaque();
          } else if (e.key === 'Enter') {
            e.preventDefault();
            const alvo = indiceDestacado >= 0 ? indiceDestacado : 0;
            if (itens[alvo]) {
              const termo = input.value;
              const achados = buscarMarkers(termo);
              if (achados[alvo]) selecionar(achados[alvo]);
            }
          } else if (e.key === 'Escape') {
            fecharPainel();
          }
        });

        // Impede que cliques/scrolls no painel afetem o mapa
        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);

        return div;
      };

      painel.addTo(mapa);
    }

    // =============================================================
    // ORQUESTRAÇÃO
    // =============================================================

    // Lê o índice de categorias, carrega cada arquivo de dados em paralelo,
    // cria os markers em seus grupos, e monta o painel de filtros.
    async function carregarTudo() {
      try {
        const categorias = await carregarYAML('data/categorias.yaml');
        const resultados = await Promise.all(
          categorias.map(cat => carregarCategoria(cat))
        );

        for (const { id, markers } of resultados) {
          const grupo = L.layerGroup();
          for (const m of markers) {
            const icone = getIcone(m);
            if (!icone) {
              console.warn(`Sem ícone registrado para marker "${m.nome}" (categoria "${m.categoria}")`);
              continue;
            }
            const marker = L.marker(m.coordenadas, { icon: icone }).addTo(grupo);

            marker.on('click', () => {
              // Passo 1: abre o popup usando tamanho máximo como estimativa
              const offsetInicial = calcularOffsetComTamanho(marker, 300, 320);
              const popup = L.popup({ offset: offsetInicial, autoPan: false })
                .setLatLng(marker.getLatLng())
                .setContent(montarPopup(m))
                .openOn(mapa);

              // Passo 2: agora que o popup está no DOM, mede o tamanho real
              // e recalcula o offset. O requestAnimationFrame garante que o
              // navegador já aplicou layout antes de a gente medir.
              requestAnimationFrame(() => {
                const el = popup.getElement();
                if (!el) return;

                const larguraReal = el.offsetWidth;
                const alturaReal = el.offsetHeight;
                const offsetFinal = calcularOffsetComTamanho(marker, larguraReal, alturaReal);

                popup.options.offset = offsetFinal;
                popup.update();
              });
            });;

            markersPorNome[normalizar(m.nome)] = marker;
            indiceBusca.push({
              nome: m.nome,
              nomeNormalizado: normalizar(m.nome),
              categoria: m.categoria,
              marker: marker,
            });
          }
          grupo.addTo(mapa);
          grupos[id] = grupo;
        }

        construirFiltros(categorias);
        construirBusca();
        abrirMarkerDaURL();
      } catch (erro) {
        console.error('Falha ao carregar markers:', erro);
      }
    }

    carregarTudo();
  </script>
</body>
</html>
